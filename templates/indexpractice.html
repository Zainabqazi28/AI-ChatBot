<!DOCTYPE html>
<html lang="en">

<head>


    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <!-- navbar -->
   <!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background:#0f172a;">
    <div class="container-fluid">

        <!-- Logo -->
        <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="{{ url_for('static', filename='images/ai-logo.jpg') }}"
                 alt="AI Logo"
                 width="50"
                 class="rounded-circle me-2">

            <span class="fw-bold fs-4">AI ChatBot</span>
        </a>

        <!-- Mobile Toggle -->
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Right Menu -->
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">

            <ul class="navbar-nav align-items-center">

                <li class="nav-item">
                    <a class="nav-link active" href="#">
                        <i class="bi bi-house-door-fill"></i> Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="bi bi-robot"></i> AI Assistant
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="bi bi-question-circle"></i> Help
                    </a>
                </li>

                <li class="nav-item ms-3">
                    <img src="{{ url_for('static', filename='images/userlogo.jpg') }}"
                         class="rounded-circle border"
                         width="40"
                         alt="User">
                </li>

            </ul>

        </div>
    </div>
</nav>
    <div class="container-fluid  mt-4 ">
        <div class="row">
            <!-- left column sidebar -->
            <div class="sidebar col-lg-2 col-md-3 text-white min-vh-100 p-3 shadow d-flex flex-column">
                <nav class=" nav flex-column mt-4">


                    <a href="#"
                        class=" sidebar-link nav-link active text-white px-3  py-2 mb-4  mt-5 d-flex align-items-center gap-2"
                        id="newchat"> <i class="bi bi-plus-square"></i>New Chat</a>

                    <a href="#"
                        class=" sidebar-link nav-link text-white px-3  py-2 mb-4  d-flex align-items-center gap-2"
                        id="searchChats"> <i class="bi bi-search"></i>Search Chats</a>

                    <a href="#"
                        class=" sidebar-link nav-link text-white px-3  py-2 mb-4   d-flex align-items-center gap-2"><i
                            class="bi bi-collection"></i>Library</a>
                    <!-- History List -->
                    <div id="historyPanel" class="mt-2" style="display:none;">
                    </div>

                    <a href="#"
                        class=" sidebar-link nav-link text-white px-3  py-2 mb-4   d-flex align-items-center gap-2"
                        id="history"><i class="bi bi-clock-history"></i>History</a>

                    <a href="#"
                        class="sidebar-link nav-link text-white px-3  py-2 mb-4   d-flex align-items-center gap-2" id="settings"><i
                            class="bi bi-gear"></i>Settings</a>
                            <div id="settingsPanel" class="mt-2" style="display:none;">

    <button class="btn btn-outline-light w-100 mb-2" id="toggleTheme">
        🌙 Dark Mode
    </button>

    <button class="btn btn-danger w-100" id="clearHistory">
        🗑 Clear History
    </button>

</div>


                </nav>
                <!-- footer -->
                <div class="border-top mt-auto pt-3">
                    <div class="d-flex  align-items-center">

                        <img class=" image rounded-circle me-3"
                            src="{{ url_for('static', filename='images/userlogo.jpg') }}" width="45">
                        <div class="">
                            <h6>Zainab Qazi</h6>

                        </div>
                    </div>
                </div>




            </div>



            <!-- right column chatbot -->
            <div class=" d-flex justify-content-center col-lg-10 col-md-9 p-3">

                <div id="searchBox" style="display:none;">
                    <input type="text" id="searchInput" placeholder="Search chats...">
                </div>

                <div id="searchResults"></div>
                <!-- <div id="historyPanel" style="display:none;" class="mt-3">
                    <h5 class="mb-3">📜 Chat History</h5>
                </div> -->
                <div class="chatbot-header card shadow w-100">
                    <div class="card-header text-center ">
                        <h3> <img src="{{ url_for('static', filename='images/ai-logo.jpg') }}"
                 alt="AI Logo"
                 width="50"
                 class="rounded-circle me-2">
 AI ChatBot</h3>
                    </div>
                    <div class="card-body text-black" style="background-color: rgba(241, 227, 227, 0.925);">
                        <div class="border rounded-3 p-3 mb-3" id="messages" style="height: 350px; overflow-y:auto">
                            <!-- Typing Indicator -->

                        </div>
                    </div>
                    <!-- suggestions -->
                    <div class="d-flex flex-wrap gap-2 mb-3" id="suggestions">
                        <button class="btn btn-light border rounded-pill px-3"
                            onclick="sendPredefined('hello','hi','hey')">
                            👋 Greetings

                        </button>
                        <button class="btn btn-light border rounded-pill px-3"
                            onclick="sendPredefined('What is your name?')">
                            🤖 Who are you?

                        </button>



                        <button class="btn btn-light border rounded-pill px-3"
                            onclick="sendPredefined('What is Machine Learning?')">
                            🤖 Machine Learning
                        </button>

                        <button class="btn btn-light border rounded-pill px-3"
                            onclick="sendPredefined('What is Deep Learning?')">
                            🧠 Deep Learning
                        </button>

                        <button class="btn btn-light border rounded-pill px-3"
                            onclick="sendPredefined('What is Artificial Intelligence?')">
                            ⚡ Artificial Intelligence
                        </button>

                        <button class="btn btn-light border rounded-pill px-3"
                            onclick="sendPredefined('What is Natural Language Processing?')">
                            💬 NLP
                        </button>

                         <button class="btn btn-light border rounded-pill px-3"
                            onclick="sendPredefined('Can you tell me about AI agent?')">
                            🤖 AI agent

                        </button>

                         <button class="btn btn-light border rounded-pill px-3"
                            onclick="sendPredefined('Give me a definition of prompt?')">
                             📝 Prompt 

                        </button>

                        <button class="btn btn-light border rounded-pill px-3"
                            onclick="sendPredefined('Give me a definition of Models')">
                              ⚙️ Models

                        </button>



                    </div>


                    <div class="input-group input-group-lg mt-3">

                        <span class="input-group-text">
        <i class="bi bi-plus-lg"></i>
    </span>


                        <input type="text" class="form-control" id="userInput" placeholder="Ask Suggestions...">
                        <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>
        </div>


    </div>






    </div>


    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
